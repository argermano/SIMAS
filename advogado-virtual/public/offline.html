<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sem conexão — SIMAS</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #F7F5F0; color: #2A3E5F; text-align: center; padding: 24px;
    }
    .card { max-width: 340px; }
    h1 { font-size: 1.25rem; margin: 16px 0 8px; }
    p { color: #5b6b82; line-height: 1.5; margin: 0; }
    svg { opacity: .85 }
    @media (prefers-color-scheme: dark) {
      body { background: #14181f; color: #cdd6e4; }
      p { color: #8895a8; }
    }
  </style>
</head>
<body>
  <div class="card">
    <svg width="56" height="56" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" fill="none">
      <rect width="32" height="32" rx="7" fill="#2A3E5F"/>
      <g transform="translate(4 4)">
        <path d="M5.5 8h13" stroke="#D4A93C" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M12 6v13M8.5 19.5h7" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="12" cy="5" r="1.5" fill="#D4A93C"/>
      </g>
    </svg>
    <h1>Você está sem conexão</h1>
    <p>Reconecte-se à internet para continuar. Se você estava gravando um atendimento, os trechos ficam guardados no aparelho e serão enviados assim que a conexão voltar.</p>
  </div>
</body>
</html>
